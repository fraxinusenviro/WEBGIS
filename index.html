<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGIS Platform</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script>
    /* Enable SharedArrayBuffer (needed by sql.js) on GitHub Pages via service worker */
    if (!crossOriginIsolated && "serviceWorker" in navigator) {
      navigator.serviceWorker.register("./coi-serviceworker.js").then((reg) => {
        if (!sessionStorage.getItem("coi-reload")) {
          sessionStorage.setItem("coi-reload", "1");
          location.reload();
        } else {
          sessionStorage.removeItem("coi-reload");
        }
      });
    }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.5.1/dist/mapbox-gl-draw.css" />
</head>
<body>
  <div id="app">
    <!-- Top Toolbar -->
    <header id="toolbar">
      <div class="toolbar-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="3,6 9,3 15,6 21,3 21,18 15,21 9,18 3,21"/>
          <line x1="9" y1="3" x2="9" y2="18"/>
          <line x1="15" y1="6" x2="15" y2="21"/>
        </svg>
        <span class="brand-name">WebGIS</span>
      </div>
      <nav class="toolbar-actions">
        <div class="toolbar-group">
          <button class="tb-btn" id="btn-new-project" title="New Project">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>New</span>
          </button>
          <button class="tb-btn" id="btn-open-project" title="Open Project">
            <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <span>Open</span>
          </button>
          <button class="tb-btn" id="btn-save-project" title="Save Project">
            <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            <span>Save</span>
          </button>
          <button class="tb-btn" id="btn-export-package" title="Export Map Package (.mapkg)">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>Package</span>
          </button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="tb-btn" id="btn-add-file" title="Add Data from File">
            <svg viewBox="0 0 24 24"><path d="M12 5v14m-7-7h14"/></svg>
            <span>Add File</span>
          </button>
          <button class="tb-btn" id="btn-add-service" title="Add Web Service">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span>Add Service</span>
          </button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="tb-btn" id="btn-geoprocessing" title="Geoprocessing Tools">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            <span>Geoprocess</span>
          </button>
          <button class="tb-btn" id="btn-attribute-table" title="Attribute Table">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            <span>Table</span>
          </button>
          <button class="tb-btn" id="btn-data-catalog" title="Data Catalog">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v4H4z"/><path d="M4 10h16v4H4z"/><path d="M4 16h16v4H4z"/><line x1="8" y1="4" x2="8" y2="20"/></svg>
            <span>Catalog</span>
          </button>
        </div>
      </nav>
      <div class="toolbar-right">
        <div class="project-name" id="project-name-display">Untitled Project</div>
        <button class="tb-btn icon-only" id="btn-settings" title="Settings">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <div id="main-content">
      <!-- Left Panel: TOC -->
      <aside id="toc-panel" class="side-panel">
        <div class="panel-header">
          <span class="panel-title">Layers</span>
          <div class="panel-actions">
            <button class="panel-btn" id="btn-toc-add-layer" title="Add Layer">+</button>
            <button class="panel-btn" id="btn-toc-collapse" title="Collapse All">−</button>
          </div>
        </div>
        <div id="layer-list" class="layer-list">
          <div class="empty-state">
            <svg viewBox="0 0 24 24"><path d="M3 6l9-3 9 3-9 3z"/><path d="M3 12l9-3 9 3-9 3z"/><path d="M3 18l9-3 9 3-9 3z"/></svg>
            <p>No layers yet.<br>Add a file or service to begin.</p>
          </div>
        </div>
        <div class="toc-section-header">
          <span class="toc-section-label">Basemaps</span>
          <button class="panel-btn" id="btn-add-basemap" title="Add Basemap">+</button>
        </div>
        <div id="basemap-list" class="basemap-list">
          <div class="bm-empty">No basemaps. Click + to add one.</div>
        </div>
        <div class="panel-footer">
          <button class="footer-btn" id="btn-zoom-all" title="Zoom to all layers">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
            Zoom All
          </button>
        </div>
      </aside>

      <!-- Resize Handle -->
      <div id="toc-resize-handle" class="resize-handle"></div>

      <!-- Map Container -->
      <div id="map-container">
        <div id="map"></div>

        <!-- Map Toolbar (floating) -->
        <div id="map-toolbar">
          <div class="map-tool-group" id="edit-tools">
            <button class="map-tool-btn" id="tool-select" title="Select / Pan" data-tool="select">
              <svg viewBox="0 0 24 24"><path d="M4 4l7.5 18 3-7.5L22 11.5z"/></svg>
            </button>
            <div class="tool-sep"></div>
            <button class="map-tool-btn" id="tool-draw-point" title="Draw Point" data-tool="draw_point">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/></svg>
            </button>
            <button class="map-tool-btn" id="tool-draw-line" title="Draw Line" data-tool="draw_line_string">
              <svg viewBox="0 0 24 24"><polyline points="3,17 7,7 13,13 17,5 21,9"/></svg>
            </button>
            <button class="map-tool-btn" id="tool-draw-polygon" title="Draw Polygon" data-tool="draw_polygon">
              <svg viewBox="0 0 24 24"><polygon points="12,3 20,9 17,19 7,19 4,9"/></svg>
            </button>
            <div class="tool-sep"></div>
            <button class="map-tool-btn" id="tool-edit-vertex" title="Edit Vertices" data-tool="direct_select">
              <svg viewBox="0 0 24 24"><rect x="2" y="2" width="5" height="5"/><rect x="17" y="2" width="5" height="5"/><rect x="2" y="17" width="5" height="5"/><rect x="17" y="17" width="5" height="5"/><line x1="4.5" y1="7" x2="4.5" y2="19.5"/><line x1="7" y1="4.5" x2="19.5" y2="4.5"/><line x1="19.5" y1="7" x2="19.5" y2="19.5"/><line x1="7" y1="19.5" x2="19.5" y2="19.5"/></svg>
            </button>
            <button class="map-tool-btn danger" id="tool-delete" title="Delete Selected" data-tool="delete">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
            <div class="tool-sep"></div>
            <button class="map-tool-btn" id="tool-measure" title="Measure Distance/Area" data-tool="measure">
              <svg viewBox="0 0 24 24"><line x1="3" y1="21" x2="21" y2="3"/><line x1="8" y1="21" x2="8" y2="16"/><line x1="13" y1="16" x2="8" y2="16"/><line x1="13" y1="21" x2="13" y2="16"/></svg>
            </button>
            <button class="map-tool-btn" id="tool-identify" title="Identify Features" data-tool="identify">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </button>
          </div>
        </div>

        <!-- Map Controls (floating right) -->
        <div id="map-controls">
          <button class="map-ctrl-btn" id="ctrl-zoom-in" title="Zoom In">+</button>
          <button class="map-ctrl-btn" id="ctrl-zoom-out" title="Zoom Out">−</button>
          <div class="ctrl-sep"></div>
          <button class="map-ctrl-btn" id="ctrl-home" title="Home Extent">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </button>
          <button class="map-ctrl-btn" id="ctrl-location" title="My Location">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
          </button>
          <div class="ctrl-sep"></div>
          <button class="map-ctrl-btn" id="ctrl-fullscreen" title="Fullscreen">
            <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
        </div>

        <!-- Coordinates Bar -->
        <div id="coords-bar">
          <span id="coords-display">Lng: — &nbsp; Lat: —</span>
          <span class="coords-sep">|</span>
          <span id="scale-display">Scale: —</span>
          <span class="coords-sep">|</span>
          <span id="zoom-display">Zoom: —</span>
          <span class="coords-sep">|</span>
          <select id="crs-select" class="coords-select" title="Coordinate Display CRS">
            <option value="4326">WGS84 (DD)</option>
            <option value="dms">WGS84 (DMS)</option>
            <option value="3857">Web Mercator</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden file inputs -->
  <input type="file" id="file-input-data" accept=".geojson,.json,.kml,.shp,.zip,.csv,.tif,.tiff,.gpkg,.mbtiles,.pdf,.gpx" multiple style="display:none" />
  <input type="file" id="file-input-project" accept=".json,.mapkg" style="display:none" />

  <!-- Modals / Overlays (injected by JS) -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="modal-container"></div>
  <div id="toast-container"></div>
  <div id="context-menu" class="context-menu hidden"></div>
  <div id="identify-popup" class="identify-popup hidden"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
